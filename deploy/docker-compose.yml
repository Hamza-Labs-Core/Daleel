# Production stack for Daleel — run from /opt/daleel on the VPS.
#   docker compose pull && docker compose up -d --wait
#
# Secrets/config come from the sibling .env file (see .env.example).
services:
  daleel:
    image: ${DALEEL_IMAGE:-ghcr.io/hamza-labs-core/daleel:latest}
    container_name: daleel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
    expose:
      - "8080"
    volumes:
      - daleel_data:/app/data   # persisted SQLite database — survives redeploys
    depends_on:
      # Start Postgres first when the optional event store is in use. Not a hard
      # health gate: the app degrades to dropping events if Postgres is unavailable.
      - postgres
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional PostgreSQL for the pipeline event store (admin /admin/usage dashboard).
  # The app only uses it when POSTGRES_CONNECTION_STRING / DATABASE_URL is set; this
  # service can be left running harmlessly even when the event store is disabled.
  postgres:
    image: postgres:16-alpine
    container_name: daleel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: daleel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: daleel_events
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daleel -d daleel_events"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      daleel:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persisted certificates — do not delete
      - caddy_config:/config
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    driver: bridge

volumes:
  daleel_data:
  postgres_data:
  caddy_data:
  caddy_config:
