# Production stack for Daleel — run from /opt/daleel on the VPS.
#   docker compose pull && docker compose up -d --wait
#
# Secrets/config come from the sibling .env file (see .env.example).
services:
  daleel:
    image: ${DALEEL_IMAGE:-ghcr.io/hamza-labs-core/daleel:latest}
    container_name: daleel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
    expose:
      - "8080"
    volumes:
      # Persisted app data — Data-Protection key ring + local-fallback logs. The database itself lives
      # in Postgres now, not here.
      - daleel_data:/app/data
    depends_on:
      # PostgreSQL is REQUIRED: the app creates/migrates its `daleel` database at startup, so wait for
      # Postgres to be healthy before booting (otherwise the first boot crash-loops until it is).
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL — REQUIRED. Backs the whole app: the main `daleel` database (Identity + app tables,
  # created on first boot), the pipeline event store (`daleel_events`), and Elsa's workflow store.
  # The app reads POSTGRES_CONNECTION_STRING / DATABASE_URL from .env to reach this service.
  postgres:
    image: postgres:16-alpine
    container_name: daleel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: daleel
      # No insecure default: a missing/empty POSTGRES_PASSWORD fails the deploy rather than silently
      # booting Postgres with a well-known password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Seeds the event-store database. The app's own `daleel` database is created at startup by EF
      # (the `daleel` superuser has rights to CREATE DATABASE), so it needs no seeding here.
      POSTGRES_DB: daleel_events
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daleel -d daleel_events"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      daleel:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persisted certificates — do not delete
      - caddy_config:/config
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    driver: bridge

volumes:
  daleel_data:
  postgres_data:
  caddy_data:
  caddy_config:
