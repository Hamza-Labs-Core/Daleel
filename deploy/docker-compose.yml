# Production stack for Daleel — run from /opt/daleel on the VPS.
#   docker compose pull && docker compose up -d --wait
#
# TLS is terminated by Cloudflare at the org level; the origin serves plain HTTP
# on port 80, which Cloudflare proxies to. No reverse proxy runs on the box.
#
# Secrets/config come from the sibling .env file (see .env.example).
services:
  daleel:
    image: ${DALEEL_IMAGE:-ghcr.io/hamza-labs-core/daleel:latest}
    container_name: daleel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
    # Host port 80 -> container 8080 (the app runs non-root and can't bind :80 directly).
    # Cloudflare connects to this origin over HTTP and terminates TLS upstream.
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
