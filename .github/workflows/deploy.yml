name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest)"
        required: false
        default: "latest"
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: ghcr.io/hamza-labs-core/daleel

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Daleel.sln

      - name: Build
        run: dotnet build Daleel.sln -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test Daleel.sln -c Release --no-restore --verbosity normal

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    # Manual approval gate — configure required reviewers on the "production"
    # environment in repo Settings -> Environments.
    environment: production
    steps:
      - uses: actions/checkout@v4   # need deploy/ config files to sync to the box

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            TAG="$REF_NAME"          # the pushed git tag, e.g. v1.2.3
          else
            TAG="${INPUT_TAG:-latest}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      - name: Write /opt/daleel/.env from GitHub secrets
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            umask 077
            # Render the runtime env from the CURRENT GitHub secret values.
            # GitHub substitutes the ${{ secrets.* }} placeholders into this
            # script before it is sent to the box. The heredoc terminator is
            # quoted ('EOF') so the remote shell writes values VERBATIM — it
            # does not expand $, backticks, etc. in secret contents.
            cat > "/tmp/daleel.env.$$" << 'EOF'
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
            CONTEXT_DEV_API_KEY=${{ secrets.CONTEXT_DEV_API_KEY }}
            GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
            APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
            # Cloudflare browser-rendering creds (org-level secrets). If unset they
            # resolve to empty, which the app treats as "absent" — harmless.
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            CADDY_DOMAIN=daleel.hamzalabs.dev
            CADDY_ACME_EMAIL=admin@daleel.hamzalabs.dev
            EOF
            # deploy.sh runs as the 'daleel' service user, so the file must be
            # owned by it (not the SSH login user) and kept private (0600).
            sudo install -o daleel -g daleel -m 0600 "/tmp/daleel.env.$$" /opt/daleel/.env
            rm -f "/tmp/daleel.env.$$"

      # Ship the latest infra config (Caddyfile / compose / deploy.sh) to the box.
      # The deploy pipeline pulls a new IMAGE, but these are bind-mounted files
      # placed by setup.sh — without this sync, repo changes to them (e.g. the
      # Caddyfile) would never reach production without a manual setup.sh re-run.
      # scp lands them in /tmp; the next step installs them with daleel ownership.
      - name: Stage deploy config on the VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/Caddyfile,deploy/docker-compose.yml,deploy/deploy.sh"
          target: "/tmp/daleel-config"
          strip_components: 1   # drop the leading deploy/ so files land flat

      - name: Deploy over SSH (install config, pull, restart, health-check, rollback)
        uses: appleboy/ssh-action@v1
        env:
          DALEEL_TAG: ${{ steps.tag.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DALEEL_TAG
          script: |
            set -euo pipefail
            # Install the freshly-staged config with the daleel service user's
            # ownership (deploy.sh and the compose stack run as that user).
            sudo install -o daleel -g daleel -m 0644 /tmp/daleel-config/Caddyfile          /opt/daleel/Caddyfile
            sudo install -o daleel -g daleel -m 0644 /tmp/daleel-config/docker-compose.yml  /opt/daleel/docker-compose.yml
            sudo install -o daleel -g daleel -m 0755 /tmp/daleel-config/deploy.sh           /opt/daleel/deploy.sh
            rm -rf /tmp/daleel-config
            cd /opt/daleel
            sudo -u daleel DALEEL_TAG="$DALEEL_TAG" ./deploy.sh "$DALEEL_TAG"
