name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest)"
        required: false
        default: "latest"
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/hamza-labs-core/daleel

concurrency:
  group: deploy-production
  # A newer push cancels an older in-flight deploy so a stalled run can never jam the
  # queue (a Testcontainers/Ryuk hang once left a run In Progress for 6.5h, blocking all
  # later deploys). The latest commit is always the one we want live anyway.
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # Hard ceiling so a stalled test never blocks the deploy queue for hours again: a
    # Testcontainers/Ryuk hang previously left this job In Progress for 6.5h, jamming the
    # concurrency slot so no later commit could deploy. Fail fast instead.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Daleel.sln

      - name: Build
        run: dotnet build Daleel.sln -c Release --no-restore -warnaserror

      - name: Test
        # The Web.Tests suite spins up a Postgres via Testcontainers. Its Ryuk reaper sidecar
        # can stall at container startup on the CI Docker socket and hang the whole run silently
        # (dotnet test produced zero output for 6.5h). Disabling Ryuk makes Testcontainers reap
        # containers on process exit instead — the documented mitigation (see PostgresTestServer).
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        # --blame-hang-timeout fails a stuck test fast and names it in the log, instead of the whole
        # job silently burning the 20-min ceiling and being killed with no clue which test hung (a
        # sync-over-async thread-pool starvation deadlock in the Postgres tests once jammed it for
        # 1h52m). dump-type none keeps the log clean — we only need the offending test name.
        run: dotnet test Daleel.sln -c Release --no-restore --verbosity normal --blame-hang-timeout 5m --blame-hang-dump-type none

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    # contents: read for the checkout; packages: read so the run-scoped
    # GITHUB_TOKEN can `docker login ghcr.io` on the VPS and pull the private image.
    permissions:
      contents: read
      packages: read
    # Manual approval gate — configure required reviewers on the "production"
    # environment in repo Settings -> Environments.
    environment: production
    steps:
      # Fail fast (before any box mutation) if a required secret is missing,
      # empty, or still the create-secrets.sh "CHANGE_ME" placeholder. Without
      # this, a blank secret silently produces a broken /opt/daleel/.env (e.g. no
      # LLM key) and the failure only surfaces deep in the health-check — or worse,
      # at runtime. Secrets are mapped to env vars rather than interpolated into
      # the script body, so multi-line values (the SSH private key!) and any shell
      # metacharacters are handled safely and can't break the test or leak.
      - name: Validate required secrets
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # critical — LLM backend
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          CONTEXT_DEV_API_KEY: ${{ secrets.CONTEXT_DEV_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          # Required — DeepL real-time UI translation. In the required set below: deploys fail fast if it is
          # missing/empty/placeholder, exactly like OPENROUTER_API_KEY.
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          # Postgres event-store credentials. POSTGRES_PASSWORD is the single source
          # of truth: the connection string is derived from it at .env render time
          # (see below), so there is no separate POSTGRES_CONNECTION_STRING secret to
          # keep in sync.
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Host secret is named DEPLOY_SSH_HOST in the repo (the "VPS IP").
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          # Optional R2 object storage (error logs, images, specs, scraped data — one bucket each). Not in
          # the unconditional required set — the app runs without it (logs to file, hot-links images). But it
          # has an INTERNAL invariant validated below: if storage is configured, the images public host must
          # be too. Bucket NAMES are not passed here: they default to daleel-{logs,images,specs,data} and only
          # need overriding via the per-bucket secrets in the .env render step below.
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_PUBLIC_URL_IMAGES: ${{ secrets.R2_PUBLIC_URL_IMAGES }}
          # Legacy single-bucket vars, still honoured as fallbacks (logs bucket + images host).
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          set -euo pipefail
          required="OPENROUTER_API_KEY SERPAPI_KEY CONTEXT_DEV_API_KEY GOOGLE_PLACES_API_KEY APIFY_TOKEN DEEPL_API_KEY POSTGRES_PASSWORD DEPLOY_SSH_HOST DEPLOY_SSH_USER DEPLOY_SSH_KEY"
          missing=""
          for var in $required; do
            val="${!var:-}"
            if [ -z "$val" ] || [ "$val" = "CHANGE_ME" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Deploy aborted — required secrets unset/empty/placeholder:$missing"
            echo "ERROR: the following required secrets are missing, empty, or still the CHANGE_ME placeholder:" >&2
            for m in $missing; do echo "  - $m" >&2; done
            echo "Set each with: gh secret set <NAME> --body '<real-value>' --repo Hamza-Labs-Core/Daleel" >&2
            exit 1
          fi
          # Conditional advisory: R2 image *hosting* needs a public host. If the storage creds are set but
          # neither R2_PUBLIC_URL_IMAGES nor the legacy R2_PUBLIC_URL is, the app deliberately falls back to
          # hot-linking images from their source (it never points an <img> at the S3 API endpoint, which would
          # 403). That's a valid, working state — e.g. R2 set up only for error logging — so this WARNS rather
          # than fails. Set R2_PUBLIC_URL_IMAGES (images bucket r2.dev URL or a custom domain) to serve images.
          if { [ -n "${R2_ACCESS_KEY:-}" ] || [ -n "${R2_SECRET_KEY:-}" ]; } \
             && [ -z "${R2_PUBLIC_URL_IMAGES:-}" ] && [ -z "${R2_PUBLIC_URL:-}" ]; then
            echo "::warning::R2 storage is configured but no images public host is set — product images will be hot-linked from source, not served from R2. Set R2_PUBLIC_URL_IMAGES (gh secret set R2_PUBLIC_URL_IMAGES --body 'https://...' --repo Hamza-Labs-Core/Daleel) to host them."
          fi
          echo "All required secrets are present and non-placeholder."

      - uses: actions/checkout@v4   # need deploy/ config files to sync to the box

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            TAG="latest"             # push to main publishes & deploys the `latest` image
          else
            TAG="${INPUT_TAG:-latest}"   # manual run can override; defaults to latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      # Bootstrap the VPS in-place. This makes the deploy FULLY self-contained:
      # on a fresh/rebuilt box it provisions everything Daleel needs to run; on an
      # already-provisioned box every check is a fast no-op. There is no separate
      # manual setup step — this replaces the old `deploy/setup.sh` entirely.
      #
      # Idempotency strategy: each section guards on the actual end state (does the
      # binary/dir/unit/file already exist?) so re-runs cost a few `command -v`/
      # `[ -f ]` checks, not a reinstall. `ufw allow` and `docker login` are
      # themselves idempotent.
      #
      # GHCR auth uses the workflow's run-scoped GITHUB_TOKEN (packages: read),
      # passed via envs: so it is NOT interpolated into the script body and never
      # appears in the rendered command or logs.
      - name: Bootstrap VPS (idempotent — provisions on first run, skips fast after)
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            APP_DIR=/opt/daleel
            log() { printf '\033[1;32m==>\033[0m %s\n' "$*"; }

            # --- 1. Docker Engine + Compose plugin (official repo) ---------------
            if command -v docker >/dev/null 2>&1; then
              log "Docker already installed — skipping."
            else
              log "Installing Docker Engine + Compose plugin..."
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y
              apt-get install -y ca-certificates curl gnupg ufw
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              . /etc/os-release
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -y
              apt-get install -y docker-ce docker-ce-cli containerd.io \
                docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            # --- 2. /opt/daleel layout -------------------------------------------
            if [ -d "$APP_DIR" ]; then
              log "$APP_DIR already exists — skipping."
            else
              log "Creating $APP_DIR ..."
              mkdir -p "$APP_DIR"
            fi

            # --- 3. systemd unit — keeps the compose stack up across reboots -----
            # Static content; write only when absent so re-runs stay fast. Heredoc
            # body + terminator sit at the YAML block's base indent so they land
            # flush-left after YAML strips it (else 'UNIT' would never match).
            if [ ! -f /etc/systemd/system/daleel.service ]; then
              log "Installing systemd unit daleel.service ..."
              cat > /etc/systemd/system/daleel.service <<'UNIT'
            [Unit]
            Description=Daleel production stack (docker compose)
            Requires=docker.service
            After=docker.service network-online.target
            Wants=network-online.target

            [Service]
            Type=oneshot
            RemainAfterExit=true
            WorkingDirectory=/opt/daleel
            ExecStart=/usr/bin/docker compose up -d --wait
            ExecStop=/usr/bin/docker compose down
            ExecReload=/usr/bin/docker compose up -d --wait
            TimeoutStartSec=300

            [Install]
            WantedBy=multi-user.target
            UNIT
              systemctl daemon-reload
              systemctl enable daleel.service
            else
              log "systemd unit daleel.service already present — skipping."
            fi

            # --- 4. UFW firewall — SSH + HTTP + HTTPS ----------------------------
            # `ufw allow` is idempotent. CRITICAL: 22 must be allowed BEFORE we
            # enable UFW, or enabling drops the SSH session this deploy rides on.
            if command -v ufw >/dev/null 2>&1; then
              log "Ensuring UFW allows 22, 80, 443 ..."
              ufw allow 22/tcp
              ufw allow 80/tcp
              ufw allow 443/tcp
              ufw allow 443/udp        # HTTP/3 (QUIC)
              ufw status | grep -q "Status: active" || ufw --force enable
            fi

            # --- 5. Docker log rotation (belt-and-suspenders alongside the
            #        per-service max-size limits in docker-compose.yml) ----------
            mkdir -p /etc/docker
            if [ ! -f /etc/docker/daemon.json ]; then
              log "Configuring Docker daemon log rotation..."
              cat > /etc/docker/daemon.json <<'JSON'
            {
              "log-driver": "json-file",
              "log-opts": { "max-size": "10m", "max-file": "3" }
            }
            JSON
              systemctl restart docker
            fi
            if [ ! -f /etc/logrotate.d/daleel ]; then
              cat > /etc/logrotate.d/daleel <<'ROT'
            /var/lib/docker/containers/*/*.log {
              rotate 7
              daily
              compress
              missingok
              delaycompress
              copytruncate
            }
            ROT
            fi

            # --- 6. GHCR login so `docker pull` of the private image works -------
            log "Logging in to ghcr.io ..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            log "Bootstrap complete — VPS is ready to deploy."

      - name: Write /opt/daleel/.env from GitHub secrets
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            umask 077
            # Render the runtime env from the CURRENT GitHub secret values.
            # GitHub substitutes the ${{ secrets.* }} placeholders into this
            # script before it is sent to the box. The heredoc terminator is
            # quoted ('EOF') so the remote shell writes values VERBATIM — it
            # does not expand $, backticks, etc. in secret contents.
            cat > "/tmp/daleel.env.$$" << 'EOF'
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
            CONTEXT_DEV_API_KEY=${{ secrets.CONTEXT_DEV_API_KEY }}
            GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
            APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
            # Optional DeepL key for real-time UI translation. Unset → empty → the app treats it as absent
            # (translation disabled, UI shows original text).
            DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
            # Cloudflare browser-rendering creds (org-level secrets). If unset they
            # resolve to empty, which the app treats as "absent" — harmless.
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            # Log-viewer Worker (optional). LOG_VIEWER_AUTH_TOKEN is the SAME secret the
            # deploy-worker.yml workflow uploads as the Worker's AUTH_TOKEN, so the admin
            # panel can call the Worker with the matching bearer. Both resolve to empty
            # when unset — the app then simply doesn't surface the log-viewer integration.
            # LOG_VIEWER_URL is the Worker's base URL (https://daleel-log-viewer.<sub>.workers.dev).
            LOG_VIEWER_URL=${{ secrets.LOG_VIEWER_URL }}
            LOG_VIEWER_AUTH_TOKEN=${{ secrets.LOG_VIEWER_AUTH_TOKEN }}
            # Cloudflare execution layer (optional — docs/architecture/cloudflare-workers-pipeline.md).
            # CF_SCRAPE_WORKER_URL/TOKEN point at workers/scrape-worker (token = its AUTH_TOKEN
            # secret); CF_QUEUES_API_TOKEN needs queues_read+queues_write; CF_POLL_QUEUE_ID is the
            # daleel-poll-work queue's ID. All resolve to empty when unset — the app then runs the
            # inline pipeline exactly as before. Enabling the routing is the separate
            # `cloudflare.execution.enabled` flag in /admin/settings.
            CF_SCRAPE_WORKER_URL=${{ secrets.CF_SCRAPE_WORKER_URL }}
            CF_SCRAPE_WORKER_TOKEN=${{ secrets.CF_SCRAPE_WORKER_TOKEN }}
            CF_QUEUES_API_TOKEN=${{ secrets.CF_QUEUES_API_TOKEN }}
            CF_POLL_QUEUE_ID=${{ secrets.CF_POLL_QUEUE_ID }}
            # Pipeline fan-out limits (PipelineLimits.cs) — repo/environment VARIABLES, not secrets.
            # Unset/empty → code defaults: entity fan-outs UNCAPPED, concurrency 16. Set a value only
            # as a deliberate RESTRAINT for this environment; the real backstops are the per-job cost
            # cap and the workflow deadline + salvage.
            PIPELINE_SUBWORKFLOW_CONCURRENCY=${{ vars.PIPELINE_SUBWORKFLOW_CONCURRENCY }}
            PIPELINE_MAX_BRANDS=${{ vars.PIPELINE_MAX_BRANDS }}
            PIPELINE_MAX_STORES=${{ vars.PIPELINE_MAX_STORES }}
            PIPELINE_MAX_ITEMS=${{ vars.PIPELINE_MAX_ITEMS }}
            PIPELINE_MAX_CONCURRENT_JOBS=${{ vars.PIPELINE_MAX_CONCURRENT_JOBS }}
            # Cloudflare R2 object storage (optional). Shared connection: if the creds
            # are unset they resolve to empty and the app falls back to file logging at
            # /app/data/logs/ — so these are intentionally NOT in the required-secrets
            # validation above. R2_ENDPOINT is normally unnecessary: the app derives it
            # from CLOUDFLARE_ACCOUNT_ID (set above). It is passed through here only so
            # an override secret (e.g. a jurisdiction-specific endpoint) takes effect
            # when set; unset it resolves to empty and the derived endpoint is used.
            R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
            R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
            R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
            # One bucket per concern. Bucket NAMES default in-app to daleel-{logs,images,
            # specs,data} — just create those buckets in Cloudflare and leave these
            # unset. Override a name only if your bucket is named differently. The legacy
            # R2_BUCKET_NAME still seeds the LOGS bucket when R2_BUCKET_LOGS is unset.
            # Pin the logs bucket to a literal so it never falls back to the legacy
            # single-bucket R2_BUCKET_NAME; the secret (when set) overrides it.
            R2_BUCKET_LOGS=${{ secrets.R2_BUCKET_LOGS || 'daleel-logs' }}
            R2_BUCKET_IMAGES=${{ secrets.R2_BUCKET_IMAGES }}
            R2_BUCKET_SPECS=${{ secrets.R2_BUCKET_SPECS }}
            R2_BUCKET_DATA=${{ secrets.R2_BUCKET_DATA }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            # Public hosts (bucket public dev URL or a custom domain bound to the bucket).
            # Images REQUIRE a public host to be served from R2 — without it the app
            # hot-links images from their source, because the S3 API endpoint 403s a
            # plain <img> GET. Specs/data hosts are optional (the DB copy stays canonical
            # when unset). Logs are never served publicly. The legacy R2_PUBLIC_URL still
            # seeds the IMAGES host when R2_PUBLIC_URL_IMAGES is unset.
            R2_PUBLIC_URL_IMAGES=${{ secrets.R2_PUBLIC_URL_IMAGES }}
            R2_PUBLIC_URL_SPECS=${{ secrets.R2_PUBLIC_URL_SPECS }}
            R2_PUBLIC_URL_DATA=${{ secrets.R2_PUBLIC_URL_DATA }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
            # Postgres event store. POSTGRES_PASSWORD now comes from a GitHub secret
            # (was previously generated once on the box). Because Postgres bakes the
            # password into postgres_data on first init, rotating the secret requires
            # wiping that volume (see the reset-postgres workflow).
            #
            # The connection string is DERIVED here from POSTGRES_PASSWORD rather than
            # read from a separate secret: the docker-compose postgres service is always
            # initialized with user `daleel` (POSTGRES_USER: daleel) and database
            # `daleel_events`, reachable on the compose network at host `postgres`. A
            # hand-maintained POSTGRES_CONNECTION_STRING secret drifted out of sync —
            # it embedded `Username=postgres`, which the container never creates, so
            # Elsa/the event store failed with `28P01: password authentication failed
            # for user "postgres"`. Synthesizing the string guarantees the username,
            # host, db, and password always match the actual container.
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_CONNECTION_STRING=Host=postgres;Port=5432;Database=daleel_events;Username=daleel;Password=${{ secrets.POSTGRES_PASSWORD }}
            # Pin production to the image this deploy resolved (push-to-main → `latest`).
            # CRITICAL: this is what actually makes prod run the latest code. `deploy.sh`
            # only `export`s DALEEL_IMAGE for its own run, but the PERSISTED .env is what
            # `docker compose up` and the systemd unit (ExecStart=docker compose up) read on
            # every restart/reboot. Production previously wrote NO DALEEL_IMAGE line and
            # leaned on the compose `:latest` default — so a stale value left in this file by
            # a QA deploy against the same box, a `workflow_dispatch` tag override, or a hand
            # edit (this is exactly how prod got stuck on `qa-pr-8`) would silently survive
            # forever: build/push goes green while compose keeps resolving the stale tag.
            # Rewriting it on every deploy evicts any leftover qa-pr-N and keeps prod on latest.
            DALEEL_IMAGE=${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            CADDY_DOMAIN=daleel.hamzalabs.dev
            CADDY_ACME_EMAIL=admin@daleel.hamzalabs.dev
            EOF
            # Everything runs as root, so write the file directly. Keep it
            # private (0600) since it holds API keys.
            install -m 0600 "/tmp/daleel.env.$$" /opt/daleel/.env
            rm -f "/tmp/daleel.env.$$"

      # Ship the latest infra config (Caddyfile / compose / deploy.sh) to the box.
      # The deploy pipeline pulls a new IMAGE, but these are bind-mounted files;
      # without this sync, repo changes to them (e.g. the Caddyfile) would never
      # reach production. The bootstrap step above only creates /opt/daleel — these
      # files are installed fresh from the repo on every deploy by the next step.
      # scp lands them in /tmp; the next step installs them into /opt/daleel.
      - name: Stage deploy config on the VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/Caddyfile,deploy/docker-compose.yml,deploy/deploy.sh"
          target: "/tmp/daleel-config"
          strip_components: 1   # drop the leading deploy/ so files land flat

      - name: Deploy over SSH (install config, pull, restart, health-check, rollback)
        uses: appleboy/ssh-action@v1
        env:
          DALEEL_TAG: ${{ steps.tag.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DALEEL_TAG
          script: |
            set -euo pipefail
            # Everything runs as root — install the freshly-staged config directly.
            install -m 0644 /tmp/daleel-config/Caddyfile          /opt/daleel/Caddyfile
            install -m 0644 /tmp/daleel-config/docker-compose.yml  /opt/daleel/docker-compose.yml
            install -m 0755 /tmp/daleel-config/deploy.sh           /opt/daleel/deploy.sh
            rm -rf /tmp/daleel-config
            cd /opt/daleel
            # NOTE: the normal deploy path NEVER touches the postgres_data volume.
            # Wiping the Postgres event store (e.g. after a POSTGRES_PASSWORD
            # rotation) is a deliberate, manual-only action — run the standalone
            # "Reset Postgres Volume" workflow (.github/workflows/reset-postgres.yml).
            # An earlier marker-file-guarded `docker volume rm` lived here; it was a
            # latent data-loss landmine (if the on-box marker was ever lost, an
            # ordinary push-to-main deploy would silently destroy the event store),
            # so it was removed in favour of the isolated, approval-gated workflow.
            DALEEL_TAG="$DALEEL_TAG" ./deploy.sh "$DALEEL_TAG"
