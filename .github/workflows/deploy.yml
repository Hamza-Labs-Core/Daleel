name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest)"
        required: false
        default: "latest"
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/hamza-labs-core/daleel

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Daleel.sln

      - name: Build
        run: dotnet build Daleel.sln -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test Daleel.sln -c Release --no-restore --verbosity normal

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    # contents: read for the checkout; packages: read so the run-scoped
    # GITHUB_TOKEN can `docker login ghcr.io` on the VPS and pull the private image.
    permissions:
      contents: read
      packages: read
    # Manual approval gate — configure required reviewers on the "production"
    # environment in repo Settings -> Environments.
    environment: production
    steps:
      # Fail fast (before any box mutation) if a required secret is missing,
      # empty, or still the create-secrets.sh "CHANGE_ME" placeholder. Without
      # this, a blank secret silently produces a broken /opt/daleel/.env (e.g. no
      # LLM key) and the failure only surfaces deep in the health-check — or worse,
      # at runtime. Secrets are mapped to env vars rather than interpolated into
      # the script body, so multi-line values (the SSH private key!) and any shell
      # metacharacters are handled safely and can't break the test or leak.
      - name: Validate required secrets
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # critical — LLM backend
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          CONTEXT_DEV_API_KEY: ${{ secrets.CONTEXT_DEV_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          # Host secret is named DEPLOY_SSH_HOST in the repo (the "VPS IP").
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          required="OPENROUTER_API_KEY SERPAPI_KEY CONTEXT_DEV_API_KEY GOOGLE_PLACES_API_KEY APIFY_TOKEN DEPLOY_SSH_HOST DEPLOY_SSH_USER DEPLOY_SSH_KEY"
          missing=""
          for var in $required; do
            val="${!var:-}"
            if [ -z "$val" ] || [ "$val" = "CHANGE_ME" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Deploy aborted — required secrets unset/empty/placeholder:$missing"
            echo "ERROR: the following required secrets are missing, empty, or still the CHANGE_ME placeholder:" >&2
            for m in $missing; do echo "  - $m" >&2; done
            echo "Set each with: gh secret set <NAME> --body '<real-value>' --repo Hamza-Labs-Core/Daleel" >&2
            exit 1
          fi
          echo "All required secrets are present and non-placeholder."

      - uses: actions/checkout@v4   # need deploy/ config files to sync to the box

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            TAG="latest"             # push to main publishes & deploys the `latest` image
          else
            TAG="${INPUT_TAG:-latest}"   # manual run can override; defaults to latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      # Bootstrap the VPS in-place. This makes the deploy FULLY self-contained:
      # on a fresh/rebuilt box it provisions everything Daleel needs to run; on an
      # already-provisioned box every check is a fast no-op. There is no separate
      # manual setup step — this replaces the old `deploy/setup.sh` entirely.
      #
      # Idempotency strategy: each section guards on the actual end state (does the
      # binary/dir/unit/file already exist?) so re-runs cost a few `command -v`/
      # `[ -f ]` checks, not a reinstall. `ufw allow` and `docker login` are
      # themselves idempotent.
      #
      # GHCR auth uses the workflow's run-scoped GITHUB_TOKEN (packages: read),
      # passed via envs: so it is NOT interpolated into the script body and never
      # appears in the rendered command or logs.
      - name: Bootstrap VPS (idempotent — provisions on first run, skips fast after)
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            APP_DIR=/opt/daleel
            log() { printf '\033[1;32m==>\033[0m %s\n' "$*"; }

            # --- 1. Docker Engine + Compose plugin (official repo) ---------------
            if command -v docker >/dev/null 2>&1; then
              log "Docker already installed — skipping."
            else
              log "Installing Docker Engine + Compose plugin..."
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y
              apt-get install -y ca-certificates curl gnupg ufw
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              . /etc/os-release
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -y
              apt-get install -y docker-ce docker-ce-cli containerd.io \
                docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            # --- 2. /opt/daleel layout -------------------------------------------
            if [ -d "$APP_DIR" ]; then
              log "$APP_DIR already exists — skipping."
            else
              log "Creating $APP_DIR ..."
              mkdir -p "$APP_DIR"
            fi

            # --- 3. systemd unit — keeps the compose stack up across reboots -----
            # Static content; write only when absent so re-runs stay fast. Heredoc
            # body + terminator sit at the YAML block's base indent so they land
            # flush-left after YAML strips it (else 'UNIT' would never match).
            if [ ! -f /etc/systemd/system/daleel.service ]; then
              log "Installing systemd unit daleel.service ..."
              cat > /etc/systemd/system/daleel.service <<'UNIT'
            [Unit]
            Description=Daleel production stack (docker compose)
            Requires=docker.service
            After=docker.service network-online.target
            Wants=network-online.target

            [Service]
            Type=oneshot
            RemainAfterExit=true
            WorkingDirectory=/opt/daleel
            ExecStart=/usr/bin/docker compose up -d --wait
            ExecStop=/usr/bin/docker compose down
            ExecReload=/usr/bin/docker compose up -d --wait
            TimeoutStartSec=300

            [Install]
            WantedBy=multi-user.target
            UNIT
              systemctl daemon-reload
              systemctl enable daleel.service
            else
              log "systemd unit daleel.service already present — skipping."
            fi

            # --- 4. UFW firewall — SSH + HTTP + HTTPS ----------------------------
            # `ufw allow` is idempotent. CRITICAL: 22 must be allowed BEFORE we
            # enable UFW, or enabling drops the SSH session this deploy rides on.
            if command -v ufw >/dev/null 2>&1; then
              log "Ensuring UFW allows 22, 80, 443 ..."
              ufw allow 22/tcp
              ufw allow 80/tcp
              ufw allow 443/tcp
              ufw allow 443/udp        # HTTP/3 (QUIC)
              ufw status | grep -q "Status: active" || ufw --force enable
            fi

            # --- 5. Docker log rotation (belt-and-suspenders alongside the
            #        per-service max-size limits in docker-compose.yml) ----------
            mkdir -p /etc/docker
            if [ ! -f /etc/docker/daemon.json ]; then
              log "Configuring Docker daemon log rotation..."
              cat > /etc/docker/daemon.json <<'JSON'
            {
              "log-driver": "json-file",
              "log-opts": { "max-size": "10m", "max-file": "3" }
            }
            JSON
              systemctl restart docker
            fi
            if [ ! -f /etc/logrotate.d/daleel ]; then
              cat > /etc/logrotate.d/daleel <<'ROT'
            /var/lib/docker/containers/*/*.log {
              rotate 7
              daily
              compress
              missingok
              delaycompress
              copytruncate
            }
            ROT
            fi

            # --- 6. GHCR login so `docker pull` of the private image works -------
            log "Logging in to ghcr.io ..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            log "Bootstrap complete — VPS is ready to deploy."

      - name: Write /opt/daleel/.env from GitHub secrets
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            umask 077
            # Render the runtime env from the CURRENT GitHub secret values.
            # GitHub substitutes the ${{ secrets.* }} placeholders into this
            # script before it is sent to the box. The heredoc terminator is
            # quoted ('EOF') so the remote shell writes values VERBATIM — it
            # does not expand $, backticks, etc. in secret contents.
            cat > "/tmp/daleel.env.$$" << 'EOF'
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
            CONTEXT_DEV_API_KEY=${{ secrets.CONTEXT_DEV_API_KEY }}
            GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
            APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
            # Cloudflare browser-rendering creds (org-level secrets). If unset they
            # resolve to empty, which the app treats as "absent" — harmless.
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            # Cloudflare R2 error-logging creds (optional). If unset they resolve to
            # empty and the app falls back to file logging at /app/data/logs/ — so
            # these are intentionally NOT in the required-secrets validation above.
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
            R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
            CADDY_DOMAIN=daleel.hamzalabs.dev
            CADDY_ACME_EMAIL=admin@daleel.hamzalabs.dev
            EOF
            # Everything runs as root, so write the file directly. Keep it
            # private (0600) since it holds API keys.
            install -m 0600 "/tmp/daleel.env.$$" /opt/daleel/.env
            rm -f "/tmp/daleel.env.$$"

      # Ship the latest infra config (Caddyfile / compose / deploy.sh) to the box.
      # The deploy pipeline pulls a new IMAGE, but these are bind-mounted files;
      # without this sync, repo changes to them (e.g. the Caddyfile) would never
      # reach production. The bootstrap step above only creates /opt/daleel — these
      # files are installed fresh from the repo on every deploy by the next step.
      # scp lands them in /tmp; the next step installs them into /opt/daleel.
      - name: Stage deploy config on the VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/Caddyfile,deploy/docker-compose.yml,deploy/deploy.sh"
          target: "/tmp/daleel-config"
          strip_components: 1   # drop the leading deploy/ so files land flat

      - name: Deploy over SSH (install config, pull, restart, health-check, rollback)
        uses: appleboy/ssh-action@v1
        env:
          DALEEL_TAG: ${{ steps.tag.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DALEEL_TAG
          script: |
            set -euo pipefail
            # Everything runs as root — install the freshly-staged config directly.
            install -m 0644 /tmp/daleel-config/Caddyfile          /opt/daleel/Caddyfile
            install -m 0644 /tmp/daleel-config/docker-compose.yml  /opt/daleel/docker-compose.yml
            install -m 0755 /tmp/daleel-config/deploy.sh           /opt/daleel/deploy.sh
            rm -rf /tmp/daleel-config
            cd /opt/daleel
            DALEEL_TAG="$DALEEL_TAG" ./deploy.sh "$DALEEL_TAG"
