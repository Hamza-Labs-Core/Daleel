# Deploys the Daleel Cloudflare worker FLEET (docs/architecture/cloudflare-workers-pipeline.md §3):
# scrape (Context.dev host), search (SerpAPI/Places caching proxy), classify / extract / filter
# (Workers-AI hosts). Each worker deploys to prod AND its isolated QA environment (`environment: qa`
# — load-bearing for secret uploads, see the qa step comment).
#
# ONE-TIME provisioning per environment (not done by `wrangler deploy`): the scrape queues + poll
# DLQs (workers/scrape-worker/README.md) and the search-cache KV namespaces
# (workers/search-worker/README.md). AI bindings need no provisioning.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN            — Workers Scripts: Edit + R2 + Queues + KV + Workers AI.
#   CLOUDFLARE_ACCOUNT_ID           — account id.
#   CF_{SCRAPE|SEARCH|CLASSIFY|EXTRACT|FILTER}_WORKER_TOKEN       — prod bearer per worker
#   CF_QA_{SCRAPE|SEARCH|CLASSIFY|EXTRACT|FILTER}_WORKER_TOKEN    — QA bearer per worker
#   (deploy.yml / deploy-qa.yml render the same values into the app's .env)
#   CONTEXT_DEV_API_KEY             — scrape-worker's vendor key
#   SERPAPI_KEY, GOOGLE_PLACES_API_KEY — search-worker's vendor keys
name: Deploy workers

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - ".github/workflows/deploy-scrape-worker.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-workers
  cancel-in-progress: false

# The job only reads the repo; deploy credentials are Cloudflare secrets, not the GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    name: ${{ matrix.worker }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - worker: scrape-worker
            prod_token: CF_SCRAPE_WORKER_TOKEN
            qa_token: CF_QA_SCRAPE_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
              CONTEXT_DEV_API_KEY
          - worker: search-worker
            prod_token: CF_SEARCH_WORKER_TOKEN
            qa_token: CF_QA_SEARCH_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
              SERPAPI_KEY
              GOOGLE_PLACES_API_KEY
          - worker: classify-worker
            prod_token: CF_CLASSIFY_WORKER_TOKEN
            qa_token: CF_QA_CLASSIFY_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
          - worker: extract-worker
            prod_token: CF_EXTRACT_WORKER_TOKEN
            qa_token: CF_QA_EXTRACT_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
          - worker: filter-worker
            prod_token: CF_FILTER_WORKER_TOKEN
            qa_token: CF_QA_FILTER_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
    defaults:
      run:
        working-directory: workers/${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v4

      # Fail fast with a clear message if this worker's required secrets are unset/empty.
      - name: Validate required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROD_TOKEN: ${{ secrets[matrix.prod_token] }}
          QA_TOKEN: ${{ secrets[matrix.qa_token] }}
        run: |
          missing=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          [ -z "$PROD_TOKEN" ] && missing="$missing ${{ matrix.prod_token }}"
          [ -z "$QA_TOKEN" ] && missing="$missing ${{ matrix.qa_token }}"
          if [ -n "$missing" ]; then
            echo "::error::${{ matrix.worker }} deploy aborted — required secrets unset/empty:$missing"
            echo "Set each with: gh secret set <NAME> --body '<value>' --repo Hamza-Labs-Core/Daleel" >&2
            exit 1
          fi
          echo "All required secrets are present."

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # CHECK-OR-CREATE the worker's Cloudflare resources for BOTH environments (idempotent):
      # scrape queues + DLQs + the poll pull-consumer; the search KV namespaces (ids resolved by
      # title and injected into wrangler.jsonc's placeholders). Existing resources are untouched.
      - name: Provision resources (prod + qa)
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ./provision.sh "${{ matrix.worker }}" prod
          ./provision.sh "${{ matrix.worker }}" qa

      - name: Deploy (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/${{ matrix.worker }}
          command: deploy
          secrets: ${{ matrix.worker_secrets }}
        env:
          AUTH_TOKEN: ${{ secrets[matrix.prod_token] }}
          CONTEXT_DEV_API_KEY: ${{ secrets.CONTEXT_DEV_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      # `environment: qa` (not `command: deploy --env qa`) is load-bearing: the action's secret
      # upload honors `environment`, so without it the QA AUTH_TOKEN would be uploaded to the PROD
      # worker — silently breaking prod auth and pointing QA at a worker whose token it doesn't hold.
      - name: Deploy (qa)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/${{ matrix.worker }}
          command: deploy
          environment: qa
          secrets: ${{ matrix.worker_secrets }}
        env:
          AUTH_TOKEN: ${{ secrets[matrix.qa_token] }}
          CONTEXT_DEV_API_KEY: ${{ secrets.CONTEXT_DEV_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
