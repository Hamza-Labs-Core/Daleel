# PROD deploy of the Daleel Cloudflare worker fleet (docs/architecture/cloudflare-workers-pipeline.md §3):
# scrape (Context.dev host), search (SerpAPI/Places caching proxy), classify / extract / filter
# (Workers-AI hosts). Mirrors the app's deploy model: PROD ships from main; QA ships from `qa`-labelled
# PRs via deploy-workers-qa.yml — each pipeline provisions and deploys ONLY its own environment.
#
# Resources are CHECK-OR-CREATED per run by workers/provision.sh (idempotent): the scrape queues +
# DLQs + poll pull-consumer, and the search-cache KV namespace (id resolved by title and injected
# into wrangler.jsonc's placeholder).
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN              — Workers Scripts: Edit + R2 + Queues + KV + Workers AI.
#   CLOUDFLARE_ACCOUNT_ID             — account id.
#   CF_{SCRAPE|SEARCH|CLASSIFY|EXTRACT|FILTER}_WORKER_TOKEN — prod bearer per worker
#   (deploy.yml renders the same values into the app's .env)
#   CONTEXT_DEV_API_KEY               — scrape-worker's vendor key
#   SERPAPI_KEY, GOOGLE_PLACES_API_KEY — search-worker's vendor keys
name: Deploy workers (prod)

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-workers-prod
  cancel-in-progress: false

# The job only reads the repo; deploy credentials are Cloudflare secrets, not the GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    name: ${{ matrix.worker }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - worker: scrape-worker
            token: CF_SCRAPE_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
              CONTEXT_DEV_API_KEY
          - worker: search-worker
            token: CF_SEARCH_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
              SERPAPI_KEY
              GOOGLE_PLACES_API_KEY
          - worker: classify-worker
            token: CF_CLASSIFY_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
          - worker: extract-worker
            token: CF_EXTRACT_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
          - worker: filter-worker
            token: CF_FILTER_WORKER_TOKEN
            worker_secrets: |
              AUTH_TOKEN
    defaults:
      run:
        working-directory: workers/${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v4

      # Fail fast with a clear message if this worker's required secrets are unset/empty.
      - name: Validate required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_TOKEN: ${{ secrets[matrix.token] }}
        run: |
          missing=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          [ -z "$WORKER_TOKEN" ] && missing="$missing ${{ matrix.token }}"
          if [ -n "$missing" ]; then
            echo "::error::${{ matrix.worker }} prod deploy aborted — required secrets unset/empty:$missing"
            echo "Set each with: gh secret set <NAME> --body '<value>' --repo Hamza-Labs-Core/Daleel" >&2
            exit 1
          fi
          echo "All required secrets are present."

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # CHECK-OR-CREATE this worker's PROD resources (idempotent; existing resources untouched).
      - name: Provision resources (prod)
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./provision.sh "${{ matrix.worker }}" prod

      - name: Deploy (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/${{ matrix.worker }}
          command: deploy
          secrets: ${{ matrix.worker_secrets }}
        env:
          AUTH_TOKEN: ${{ secrets[matrix.token] }}
          CONTEXT_DEV_API_KEY: ${{ secrets.CONTEXT_DEV_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
