name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  IMAGE_NAME: ghcr.io/hamza-labs-core/daleel

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (-warnaserror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Daleel.sln

      - name: Build
        run: dotnet build Daleel.sln -c Release --no-restore -warnaserror

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Daleel.sln

      - name: Test
        run: dotnet test Daleel.sln -c Release --no-restore --verbosity normal

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    # Only build the image on pushes to main (not on PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      # Build and push in one step — the "push" gate (main only) is the same condition
      # as this whole job, so a successful docker build publishes to GHCR.
      #
      # NOTE: no secrets/build-args are passed here ON PURPOSE. The image is built
      # config-free (the Dockerfile only runs `dotnet publish`); every API key and
      # provider credential is injected at RUNTIME via /opt/daleel/.env, which the
      # deploy workflow writes on the VPS from GitHub secrets. If a build-time
      # secret ever becomes necessary, add it with build-push-action's `secrets:`
      # input (BuildKit `--mount=type=secret`) rather than `build-args` so it is
      # never baked into an image layer.
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Confirm publish
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Report published image
        run: |
          echo "Published ${{ env.IMAGE_NAME }}:latest"
          echo "Digest: ${{ needs.docker.outputs.digest }}"
