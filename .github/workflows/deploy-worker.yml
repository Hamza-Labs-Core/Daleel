# Deploys the daleel-log-viewer Cloudflare Worker (read-only HTTP view over the
# daleel-logs R2 bucket). Replaces the manual `wrangler deploy` documented in
# workers/log-viewer/README.md.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with "Workers Scripts: Edit"
#                            + "Workers R2 Storage: Read" permissions. This is a
#                            DIFFERENT credential from the S3-style R2_ACCESS_KEY/
#                            R2_SECRET_KEY the .NET app uses — those cannot deploy
#                            Workers. Create one at:
#                            https://dash.cloudflare.com/profile/api-tokens
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID (dash → right sidebar).
#
# Auth stays ON (this Worker exposes production logs over a public *.workers.dev
# URL and must never be open to the world), but there is NO separate auth secret
# to manage. The Worker's AUTH_TOKEN is DERIVED in CI as:
#
#   AUTH_TOKEN = sha256("daleel-log-viewer:" + CLOUDFLARE_API_TOKEN)
#
# This is deterministic (same value every deploy), stored nowhere, and never
# printed (it's masked in the logs). Because SHA-256 is one-way, the bearer token
# does NOT reveal CLOUDFLARE_API_TOKEN, so a leaked log-viewer token can't deploy
# Workers or read R2. Reproduce the token locally to read logs:
#
#   printf '%s' "daleel-log-viewer:$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1
#   # macOS: ... | shasum -a 256 | cut -d' ' -f1
#
# Set the two secrets with:
#   gh secret set CLOUDFLARE_API_TOKEN  --body '<token>' --repo Hamza-Labs-Core/Daleel
#   gh secret set CLOUDFLARE_ACCOUNT_ID --body '<id>'    --repo Hamza-Labs-Core/Daleel
name: Deploy log-viewer Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/log-viewer/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: {}

# Don't let two deploys of the same Worker race; cancel an in-flight one.
concurrency:
  group: deploy-log-viewer-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/log-viewer
    steps:
      - uses: actions/checkout@v4

      # Fail fast with a clear message if any required secret is unset/empty,
      # rather than letting wrangler emit a cryptic auth error mid-deploy.
      - name: Validate required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=""
          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            eval "val=\${$var}"
            if [ -z "$val" ]; then missing="$missing $var"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Worker deploy aborted — required secrets unset/empty:$missing"
            echo "Set each with: gh secret set <NAME> --body '<value>' --repo Hamza-Labs-Core/Daleel" >&2
            exit 1
          fi
          echo "All required secrets are present."

      # Derive the Worker bearer token deterministically from CLOUDFLARE_API_TOKEN.
      # `add-mask` registers it so it's redacted everywhere in the logs, and it's
      # passed to later steps via $GITHUB_ENV — never echoed, stored, or uploaded.
      - name: Derive AUTH_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          token=$(printf '%s' "daleel-log-viewer:$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)
          echo "::add-mask::$token"
          echo "AUTH_TOKEN=$token" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # Official action: deploys, and uploads AUTH_TOKEN as a Worker secret first.
      # `secrets:` is a newline list of NAMES; each value is read from the env var
      # of the same name. AUTH_TOKEN comes from the derive step above (via GITHUB_ENV).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/log-viewer
          command: deploy
          secrets: |
            AUTH_TOKEN
        env:
          AUTH_TOKEN: ${{ env.AUTH_TOKEN }}
