# Deploys the daleel-log-viewer Cloudflare Worker (read-only HTTP view over the
# daleel-logs R2 bucket). Replaces the manual `wrangler deploy` documented in
# workers/log-viewer/README.md.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with "Workers Scripts: Edit"
#                            + "Workers R2 Storage: Read" permissions. This is a
#                            DIFFERENT credential from the S3-style R2_ACCESS_KEY/
#                            R2_SECRET_KEY the .NET app uses — those cannot deploy
#                            Workers. Create one at:
#                            https://dash.cloudflare.com/profile/api-tokens
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID (dash → right sidebar).
#   LOG_VIEWER_AUTH_TOKEN  — the bearer token the Worker checks on every request.
#                            Uploaded as the Worker's AUTH_TOKEN secret on each
#                            deploy. Generate with `openssl rand -hex 32`. The
#                            SAME secret is rendered into the app's .env by
#                            deploy.yml (as LOG_VIEWER_AUTH_TOKEN) so the admin
#                            panel can call this Worker — one value, one source.
#
# Auth stays ON: this Worker exposes production logs over a public *.workers.dev
# URL, so it must never be open to the world. The token lives ONLY in GitHub
# secrets (never committed to the repo); read it from your password manager.
#
# Set the secrets with:
#   gh secret set CLOUDFLARE_API_TOKEN  --body '<token>'                 --repo Hamza-Labs-Core/Daleel
#   gh secret set CLOUDFLARE_ACCOUNT_ID --body '<id>'                    --repo Hamza-Labs-Core/Daleel
#   gh secret set LOG_VIEWER_AUTH_TOKEN --body "$(openssl rand -hex 32)" --repo Hamza-Labs-Core/Daleel
name: Deploy log-viewer Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/log-viewer/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: {}

# Don't let two deploys of the same Worker race; cancel an in-flight one.
concurrency:
  group: deploy-log-viewer-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/log-viewer
    steps:
      - uses: actions/checkout@v4

      # Fail fast with a clear message if any required secret is unset/empty,
      # rather than letting wrangler emit a cryptic auth error mid-deploy.
      - name: Validate required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LOG_VIEWER_AUTH_TOKEN: ${{ secrets.LOG_VIEWER_AUTH_TOKEN }}
        run: |
          missing=""
          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID LOG_VIEWER_AUTH_TOKEN; do
            eval "val=\${$var}"
            if [ -z "$val" ]; then missing="$missing $var"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Worker deploy aborted — required secrets unset/empty:$missing"
            echo "Set each with: gh secret set <NAME> --body '<value>' --repo Hamza-Labs-Core/Daleel" >&2
            exit 1
          fi
          echo "All required secrets are present."

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # Official action: deploys, and uploads AUTH_TOKEN as a Worker secret first.
      # `secrets:` is a newline list of NAMES; each value is read from the env var
      # of the same name (here AUTH_TOKEN ← LOG_VIEWER_AUTH_TOKEN GitHub secret).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/log-viewer
          command: deploy
          secrets: |
            AUTH_TOKEN
        env:
          AUTH_TOKEN: ${{ secrets.LOG_VIEWER_AUTH_TOKEN }}
