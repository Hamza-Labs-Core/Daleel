name = "daleel-search-worker"
main = "src/index.js"
compatibility_date = "2026-06-01"

# The SEARCH execution host of docs/architecture/cloudflare-workers-pipeline.md (§3.5), Phase A:
# a caching PROXY in front of the exact vendor endpoints the VPS already calls (SerpAPI GET
# /search, Google Places POST). The vendor API keys live here as worker secrets — off the VPS —
# and hot repeat queries short-circuit on the KV cache below. The VPS's SerpApiProvider /
# GooglePlacesProvider keep their parsing and simply point their base URL at this worker.
#
# KV is a best-effort ACCELERATOR only: Postgres SearchCache on the VPS stays the authoritative
# cache. Only 200 vendor bodies are cached; every proxied response carries X-Cache: hit|miss.

# Edge cache for raw vendor JSON. Provision first, then paste the namespace id:
#   wrangler kv namespace create daleel-search-cache
[[kv_namespaces]]
binding = "SEARCH_CACHE"
id = "<paste-id-after-provisioning>"

[observability]
enabled = true

# Plain (non-secret) config. CACHE_TTL_SECONDS is the SerpAPI cache TTL (default 3600 if unset
# or unparsable; the worker clamps to KV's minimum of 60). Places responses use a fixed 900 s.
[vars]
CACHE_TTL_SECONDS = "3600"

# QA deployment: `wrangler deploy --env qa`. Separate KV namespace — QA cache entries must never
# serve prod traffic (or vice versa):
#   wrangler kv namespace create daleel-qa-search-cache
[env.qa]
name = "daleel-search-worker-qa"
vars = { CACHE_TTL_SECONDS = "3600" }

[[env.qa.kv_namespaces]]
binding = "SEARCH_CACHE"
id = "<paste-qa-id-after-provisioning>"

# SECRETS (never in this file) — set with `wrangler secret put <NAME>` (add `--env qa` for QA):
#   AUTH_TOKEN              bearer the VPS presents (house auth pattern, see scrape-worker)
#   SERPAPI_KEY             SerpAPI key, moved here from the VPS; injected as api_key
#   GOOGLE_PLACES_API_KEY   Google Places key, moved here from the VPS; injected as X-Goog-Api-Key
